[package]
name = "leptos-webview2-repro"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "leptos-webview2-repro"
path = "src/main.rs"

[dependencies]
leptos = { version = "0.8", default-features = false, features = ["csr"] }
console_error_panic_hook = "0.1"
gloo-timers = { version = "0.3", features = ["futures"] }
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["console", "Document", "Element", "Window", "HtmlElement", "MouseEvent", "EventTarget"] }
