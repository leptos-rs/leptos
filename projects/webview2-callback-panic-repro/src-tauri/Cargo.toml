[package]
name = "leptos-webview2-repro-tauri"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "leptos_webview2_repro_tauri"

[[bin]]
name = "leptos-webview2-repro-tauri"
path = "src/main.rs"

[dependencies]
tauri = { version = "2", features = ["wry"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
tauri-build = { version = "2", features = [] }
