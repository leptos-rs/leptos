[package]
name = "crdt-kit-example-server"
version = "0.1.0"
edition = "2021"

[dependencies]
crdt-kit = { version = "0.5", features = ["serde"] }
axum = { version = "0.7", features = ["ws"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.10.2"
